<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Darkflame Online TCG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ---------------------------
     スタート画面
---------------------------- -->
<div id="startScreen">
  <h1>Darkflame Online TCG</h1>

  <div class="inputBox">
    <label>ユーザー名：</label>
    <input id="user" type="text" placeholder="あなたの名前">
  </div>

  <div class="inputBox">
    <label>ルーム名：</label>
    <input id="room" type="text" placeholder="ルーム名">
  </div>

  <button onclick="startGame()">ゲーム開始</button>
</div>

<!-- ---------------------------
     ゲーム画面
---------------------------- -->
<div id="gameScreen" style="display:none;">

  <!-- 左：プレイヤー一覧 -->
  <div id="leftPanel">
    <h2>プレイヤー一覧</h2>
    <div id="playerList"></div>
  </div>

  <!-- 中央：ゲーム情報 -->
  <div id="centerPanel">
    <h2>ゲーム情報</h2>

    <div class="infoRow">
      <span>現在のターン：</span>
      <span id="turnPlayer">---</span>
    </div>

    <div class="infoRow">
      <span>ラウンド：</span>
      <span id="roundNumber">1</span>
    </div>

    <div class="infoRow">
      <span>環境効果：</span>
      <span id="environmentEffect">なし</span>
    </div>

    <hr>

    <!-- 攻撃対象 -->
    <div class="infoRow">
      <span>攻撃対象：</span>
      <select id="targetSelect"></select>
    </div>

    <button onclick="playSelectedCard()">カードを出す</button>

    <div class="infoRow">
      <button id="redrawBtn" onclick="redraw()">引き直し（全交換）</button>
      <span id="redrawCooldownText"></span>
    </div>

    <hr>

    <h3>手札</h3>
    <div id="hand"></div>
  </div>

  <!-- 右：チャット -->
  <div id="rightPanel">
    <h2>チャット</h2>
    <div id="chat" class="chatWindow"></div>

    <input id="msg" type="text" placeholder="メッセージ">
    <button onclick="sendChat()">送信</button>
  </div>

</div>

<script src="client.js"></script>
</body>
</html>
