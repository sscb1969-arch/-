<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Darkflame Online TCG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ★ 開始画面 -->
<div id="startScreen">
  <h1>Darkflame Online TCG</h1>

  <h2>ルール説明</h2>
  <p>
    ・ターン制のオンラインカードバトル<br>
    ・攻撃・防御・妨害カードを使って相手のHPを0にすると勝利<br>
    ・環境カードでターン効果が変化<br>
    ・最初の手札は3枚
  </p>

  <label>名前：</label>
  <input id="user" type="text"><br><br>

  <label>ルーム名：</label>
  <input id="room" type="text"><br><br>

  <button onclick="startGame()">ゲーム開始</button>
</div>

<!-- ★ ゲーム画面（開始後に表示） -->
<div id="gameScreen" style="display:none;">
  <h2>Darkflame Online TCG</h2>

  <div>
    <h3>プレイヤー一覧</h3>
    <div id="playerList"></div>
  </div>

  <div>
    <h3>現在のターン：<span id="turnPlayer"></span></h3>
    <h3>環境効果：<span id="fieldEffect">なし</span></h3>
  </div>

  <div>
    <h3>攻撃対象</h3>
    <input id="target" type="text">
    <button onclick="playSelectedCard()">カードを出す</button>
    <button onclick="redraw()">引き直し（最大2枚）</button>
  </div>

  <div>
    <h3>手札</h3>
    <div id="hand"></div>
  </div>

  <div>
    <h3>チャット</h3>
    <div id="chat" class="chatBox"></div>
    <input id="msg" type="text">
    <button onclick="sendChat()">送信</button>
  </div>
</div>

<script src="client.js"></script>
</body>
</html>
